services:
  - type: web
    name: papertrail-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: DATABASE_URL
        fromDatabase:
          name: papertrail-db
          property: connectionString
      - key: POSTGRES_SSL
        value: "false"
      - key: CORS_ORIGIN
        sync: false
      - key: AUTH_SESSION_TTL_HOURS
        value: "168"
      - key: REDIS_URL
        sync: false
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USER
        sync: false
      - key: NEO4J_PASSWORD
        sync: false

  - type: web
    name: papertrail-web
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: VITE_API_BASE
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: papertrail-db
    plan: free
    region: ohio
